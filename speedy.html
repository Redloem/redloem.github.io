<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VPN доступ</title>
</head>

<body style="font-family:sans-serif; max-width:420px; margin:auto; padding:20px;">

<h2>🚀 VPN доступ</h2>

<div id="app"></div>

<script>
const API = "https://api.muvik3d.workers.dev";
let interval = null;

// ===== UI =====

function renderStart() {
  document.getElementById("app").innerHTML = `
    <h3>💳 Оплата</h3>
    <a href="https://yoomoney.ru/to/41001638704386" target="_blank">
      <button style="width:100%; padding:12px;">💰 Оплатить</button>
    </a>

    <br><br>

    <button onclick="renderForm()" style="width:100%; padding:12px;">
      ✅ Я оплатил
    </button>
  `;
}

function renderForm() {
  document.getElementById("app").innerHTML = `
    <input id="user" placeholder="Ваш ник" style="width:100%; padding:10px;"><br><br>
    <button onclick="createOrder()" style="width:100%; padding:12px;">
      🚀 Создать заявку
    </button>
  `;
}

function renderStatus(id) {
  document.getElementById("app").innerHTML = `
    <h3>Заявка: ${id}</h3>

    <div style="padding:10px; background:#f3f3f3; border-radius:10px;">
      <p id="status">⏳ Ожидаем...</p>
    </div>

    <br>

    <div style="padding:10px; background:#e9ffe9; border-radius:10px;">
      <p><b>Ваш ключ:</b></p>

      <div id="keyBox" style="
        max-height:100px;
        overflow:auto;
        font-size:12px;
        word-break:break-all;
        background:#fff;
        padding:8px;
        border-radius:6px;
      ">—</div>

      <br>

      <button onclick="copyKey()" style="width:100%;">
        📋 Скопировать ключ
      </button>
    </div>

    <br>

    <button onclick="checkStatus()" style="width:100%;">
      🔄 Обновить
    </button>

    <br><br>

    <button onclick="resetAll()" style="width:100%;">
      ❌ Новый заказ
    </button>
  `;

  startAutoCheck();
}

// ===== ЛОГИКА =====

async function createOrder() {
  const user = document.getElementById("user").value;

  const res = await fetch(API + "/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user })
  });

  const data = await res.json();

  localStorage.setItem("vpn_id", data.id);
  renderStatus(data.id);
}

async function checkStatus() {
  const id = localStorage.getItem("vpn_id");

  const res = await fetch(API + "/check?id=" + id);
  const data = await res.json();

  if (data.status === "pending") {
    document.getElementById("status").innerText = "⏳ Ожидайте...";
  }

  if (data.status === "done") {
    document.getElementById("status").innerText = "✅ Готово";
    document.getElementById("keyBox").innerText = data.key;

    stopAutoCheck();
  }
}

function copyKey() {
  const text = document.getElementById("keyBox").innerText;
  navigator.clipboard.writeText(text);
  alert("Ключ скопирован");
}

function resetAll() {
  localStorage.removeItem("vpn_id");
  stopAutoCheck();
  renderStart();
}

// ===== АВТОПРОВЕРКА =====

function startAutoCheck() {
  if (interval) return;

  interval = setInterval(() => {
    checkStatus();
  }, 5000); // каждые 5 сек
}

function stopAutoCheck() {
  if (interval) {
    clearInterval(interval);
    interval = null;
  }
}

// ===== INIT =====

const saved = localStorage.getItem("vpn_id");

if (saved) {
  renderStatus(saved);
} else {
  renderStart();
}
</script>

</body>
</html>
