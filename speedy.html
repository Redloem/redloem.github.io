<head>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;

  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 16px;
  box-sizing: border-box;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}
.logo img {
  width: 70px;
  border-radius: 16px;
}

h1 {
  font-size: 24px;
  margin: 0 0 10px;
  text-align: center;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.5;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  margin-top: 10px;
}
button {
  transition: transform 0.05s ease, opacity 0.1s ease;
}

button:active {
  transform: scale(0.97);
  opacity: 0.85;
}

.primary { background: #007aff; color: white; }
.secondary { background: #e5e5ea; }
.link { background: #34c759; color: white; }

.plan-active {
  background: #007aff;
  color: white;
}

.small {
  font-size: 14px;
  color: #777;
  line-height: 1.5;
}

.tight {
  margin-top: 6px;
  margin-bottom: 6px;
}

.keybox {
  background: #f2f2f7;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  border: 1px solid #e5e5ea;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  font-size: 16px;
  margin-bottom: 10px;
}
  .loader {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ccc;
    border-top-color: #007aff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .fade-in {
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.3s ease;
  }

  .fade-in.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
<!-- iOS Home Screen Icon -->
<link rel="apple-touch-icon" sizes="180x180" href="/logo.jpg">
<link rel="apple-touch-icon" sizes="167x167" href="/logo.jpg">
<link rel="apple-touch-icon" sizes="152x152" href="/logo.jpg">
<link rel="icon" type="image/png" href="/logo.jpg">

<!-- Prevent iOS caching issues -->
<meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>

<div class="container">
  <div class="card" id="app"></div>
</div>

<script>
const API = "https://api.muvik3d.workers.dev";

let selectedPlan = null;
let isReadyShown = false;

let screenHistory = [];

function goBack() {
  if (screenHistory.length > 0) {
    const prev = screenHistory.pop();
    prev();
  } else {
    renderMenu();
  }
}

// ===== МЕНЮ =====
function renderMenu() {
  document.getElementById("app").innerHTML = `
    <div class="logo"><img src="logo.jpg"></div>

    <h1>Speedy VPN</h1>

    <div class="subtitle">
      Доступ к скорости<br><br>

      Статус: онлайн<br>
      Основной сервер сейчас<br>
      имеет лококацию: Нидерланды<br>

      Наш телеграм бот:
      <a href="https://t.me/speedystart_bot" target="_blank">@speedystart_bot</a>
    </div>

    <button class="primary" onclick="renderBuy()">💳 Оплатить</button>
    <button class="secondary" onclick="renderDownload()">📲 Скачать</button>
    <button class="secondary" onclick="renderHow()">📘 Инструкция</button>
    <button class="secondary" onclick="renderSupport()">📩 Поддержка</button>
    <button class="secondary" onclick="renderCheck()">🔍 Проверить заявку</button>
  `;
}

// ===== ПРОВЕРКА =====
function renderCheck() {
  screenHistory.push(renderMenu);
  document.getElementById("app").innerHTML = `
    <h1>🔍 Проверка</h1>

    <input id="checkId" placeholder="Номер заявки">

    <button class="primary" onclick="checkManual()">Проверить</button>
    <button class="secondary" onclick="goBack()">← Назад</button>
  `;
}

async function checkManual() {
  const id = document.getElementById("checkId").value;

  if (!id) return alert("Введите номер");

  // простая защита от перебора
  manualAttempts++;
  if (manualAttempts > 5) {
    alert("Слишком много попыток. Попробуйте позже.");
    return;
  }

  if (!/^[0-9]{4}$/.test(id)) {
    alert("Некорректный номер");
    return;
  }

  try {
    const res = await fetch(API + "/check?id=" + id);
    const data = await res.json();

    if (data.status !== "done") {
      alert("❌ Не готово");
      return;
    }

    const end = new Date(data.end_date);
    alert("Действует до: " + end.toLocaleDateString("ru-RU"));
  } catch (e) {
    // не показываем ошибку — просто игнорируем
  }
}

// ===== ОПЛАТА =====
function renderBuy() {
  screenHistory.push(renderMenu);
  document.getElementById("app").innerHTML = `
    <h1>💳 Оплата</h1>

    <div class="small">
      Выберите срок:<br>
      • 30 дней — 100₽<br>
      • 90 дней — 300₽<br>
      • 180 дней — 600₽<br>
      • 365 дней — 1200₽<br><br>
      1 ключ = 1 устройство<br><br>
      Если выбрали более 30 дней,<br>
      тогда на оплате поменяйте "100 рублей"<br>
    </div>

    <a href="https://yoomoney.ru/to/41001638704386" target="_blank" onclick="markPaymentStarted()">
      <button class="primary">💰 Оплатить</button>
    </a>

    <div class="small" style="margin-top:10px;">
     ⬇️ После оплаты нажмите кнопку ниже ⬇️
    </div>

    <button class="secondary" onclick="renderForm()">✅ Я оплатил</button>
    <button class="secondary" onclick="goBack()">← Назад</button>
  `;
}

function markPaymentStarted() {
  localStorage.setItem("payment_started", "1");
}

// ===== ФОРМА =====
function renderForm() {
  screenHistory.push(renderBuy);
  selectedPlan = null;

  document.getElementById("app").innerHTML = `
    <h1>📝Заявка </h1>

<input id="user" maxlength="30" oninput="limitUserInput(this)" placeholder="Ваш Telegram ник или имя">

    <p class="small tight">Оплаченный срок подписки:</p>

    <button id="plan30" onclick="selectPlan(30)">30 дней</button>
    <button id="plan90" onclick="selectPlan(90)">90 дней</button>
    <button id="plan180" onclick="selectPlan(180)">180 дней</button>
    <button id="plan365" onclick="selectPlan(365)">365 дней</button>

    <p id="planText" class="small tight">Не выбран</p>

    <button class="primary" onclick="createOrder()">Отправить</button>
    <button class="secondary" onclick="goBack()">← Назад</button>
  `;
}

function selectPlan(days) {
  selectedPlan = days;

  // сброс всех кнопок
  const plans = [30, 90, 180, 365];
  plans.forEach(p => {
    const btn = document.getElementById("plan" + p);
    if (btn) btn.classList.remove("plan-active");
  });

  // активная кнопка
  const activeBtn = document.getElementById("plan" + days);
  if (activeBtn) activeBtn.classList.add("plan-active");

  document.getElementById("planText").innerText = "Выбрано: " + days + " дней";
}

function limitUserInput(el) {
  // общий лимит 30 символов
  if (el.value.length > 30) {
    el.value = el.value.slice(0, 30);
  }

  // ограничение на количество "@"
  const maxAt = 5;
  let countAt = (el.value.match(/@/g) || []).length;

  if (countAt > maxAt) {
    let newVal = "";
    let atUsed = 0;

    for (let ch of el.value) {
      if (ch === "@") {
        if (atUsed < maxAt) {
          newVal += ch;
          atUsed++;
        }
      } else {
        newVal += ch;
      }
    }

    el.value = newVal;
  }
}

// ===== CREATE =====
async function createOrder() {
  const user = document.getElementById("user").value.trim();

  if (user.length > 30) {
    return alert("Максимум 30 символов");
  }

  if (!user) return alert("Введите ник телеграм или имя");
  if (!selectedPlan) return alert("Выберите срок");

  const res = await fetch(API + "/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user, plan: selectedPlan })
  });

  const data = await res.json();

  localStorage.setItem("vpn_id", data.id);
  localStorage.setItem("vpn_user", user);
  localStorage.setItem("vpn_plan", selectedPlan);
  localStorage.removeItem("vpn_key");

  renderStatus(data.id);
}



// ===== СТАТУС =====
function renderStatus(id) {
  if (checker) {
    clearInterval(checker);
  }
  interval = 3000;

  const user = localStorage.getItem("vpn_user");
  const plan = localStorage.getItem("vpn_plan");

  document.getElementById("app").innerHTML = `
    <h1>🔐 Доступ</h1>

    <p>Заявка <b>${id}</b></p>

    <div class="small">
      👤 ${user}<br>
      📅 ${plan} дней<br><br> 
    </div>

    <div id="keyBox" class="keybox"></div>

    <div class="small" style="margin-top:10px;">
      Проверяем факт оплаты.<br>
      После подтверждения статус<br> 
      изменится на "Готово"<br><br>

      Обычно до 10 минут (09:00–18:00 МСК)<br>
      В другое время возможны задержки<br><br>

      Поддержка:
      <a href="https://t.me/speedy_supportbot">@speedy_supportbot</a>
    </div>

    <button id="copyBtn" style="display:none; text-decoration:none;" onclick="copyKey()">📋 Скопировать ключ</button>

    <button class="secondary" onclick="reset()">🔄 Новый заказ</button>
  `;

  checkStatus();
  startChecking();
}

let interval = 3000;
let checker;
let manualAttempts = 0;

function startChecking() {
  checker = setInterval(checkStatus, interval);

  setTimeout(() => {
    clearInterval(checker);
    interval = 5000;
    checker = setInterval(checkStatus, interval);
  }, 30000);
}

// ===== ПРОВЕРКА =====
async function checkStatus() {
  if (!document.getElementById("keyBox")) return;
  if (localStorage.getItem("vpn_used_local") === "1") {
    const btn = document.getElementById("copyBtn");
    if (btn) {
      btn.style.display = "block";
      btn.innerText = "✅ Скопировано";
      btn.disabled = true;
    }
    document.getElementById("keyBox").innerHTML = `✅ Готово`;
    return;
  }

  const id = localStorage.getItem("vpn_id");

  let data;
  try {
    const res = await fetch(API + "/check?id=" + id, {
      cache: "no-store"
    });
    data = await res.json();
    if (data.status === "done") {
      isReadyShown = false;
    }
  } catch (e) {
    // не пугаем пользователя — просто пробуем позже
    document.getElementById("keyBox").innerHTML = `<span class="loader"></span>Проверяем...`;
    return;
  }

  // 🔥 если отказ (нет оплаты)
  if (data.status === "rejected") {
    if (checker) clearInterval(checker);

    document.getElementById("keyBox").innerHTML = `
      ❌ Оплата не найдена<br><br>

      <a href="https://yoomoney.ru/to/41001638704386" target="_blank" onclick="markPaymentStarted(); setTimeout(checkStatus, 200);">
        <button class="primary">Если пропустили шаг оплаты</button>
      </a><br>

      ${localStorage.getItem("payment_started") === "1" ? `<button class="secondary" onclick="retryPayment()">🔁 Я точно оплатил</button>` : ""}

      <div class="small" style="margin-top:10px;">
        Если уже оплатили — напишите в поддержку
      </div>
    `;

    const btn = document.getElementById("copyBtn");
    if (btn) btn.style.display = "none";

    return;
  }

  // 🔥 если уже использован
  if (data.used) {
    document.getElementById("keyBox").innerHTML = `✅ Готово`;

    const btn = document.getElementById("copyBtn");
    btn.style.display = "block";
    btn.innerText = "✅ Скопировано";
    btn.disabled = true;

    return;
  }

  // 🔥 если готово и есть ключ
  if (data.status === "done" && data.key) {
    localStorage.setItem("vpn_key", data.key);
    showReady();
    if (checker) clearInterval(checker);
  } else if (data.status === "pending") {
    document.getElementById("keyBox").innerHTML = `<span class="loader"></span>Ожидаем проверку оплаты`;
  }
}

// ===== ГОТОВО =====
function showReady() {
  if (isReadyShown) return;
  isReadyShown = true;

  const box = document.getElementById("keyBox");
  box.innerHTML = `<span class="fade-in">✅ Готово</span>`;

  setTimeout(() => {
    const el = box.querySelector(".fade-in");
    if (el) el.classList.add("show");
  }, 10);

  document.getElementById("copyBtn").style.display = "block";
  document.getElementById("copyBtn").classList.add("link");
}

// ===== RETRY PAYMENT =====
async function retryPayment() {
  const id = localStorage.getItem("vpn_id");

  const box = document.getElementById("keyBox");
  box.innerHTML = `<span class="loader"></span>Отправляем запрос...`;

  try {
    const res = await fetch(API + "/retry?id=" + id, { cache: "no-store" });

    // даже если ответ не прочитался — считаем успешным (воркер уже получил)
    if (res && res.ok) {
      alert("Запрос отправлен. Ожидайте проверки");
      startChecking();
    } else {
      alert("Запрос отправлен. Ожидайте проверки");
      startChecking();
    }

  } catch (e) {
    // 🔥 важно: не пугаем пользователя, если сервер уже получил запрос
    alert("Запрос отправлен. Ожидайте проверки");
    startChecking();
  }
}

// ===== КОПИЯ =====
async function copyKey() {
  const key = localStorage.getItem("vpn_key");
  const id = localStorage.getItem("vpn_id");

  const btn = document.getElementById("copyBtn");
  btn.innerHTML = `<span class="loader"></span>Копирование...`;
  btn.disabled = true;
  await navigator.clipboard.writeText(key);
  localStorage.setItem("vpn_used_local", "1");

  // 🔥 быстрый отклик пользователю
  alert("КЛЮЧ СКОПИРОВАН\n\nМожете вставлять в приложение");

  // дальше уже фоновая работа (не тормозит UX)
  fetch(API + "/use?id=" + id);

  localStorage.removeItem("vpn_key");

  btn.innerText = "✅ Скопировано";
  btn.disabled = true;
  btn.classList.remove("link");
  btn.classList.add("secondary");
  btn.style.textDecoration = "none";
}

// ===== RESET =====
function reset() {
  const confirmExit = confirm("Вы перейдёте к созданию новой заявки.\nТекущая информация будет сброшена.\nПродолжить?");
  if (!confirmExit) return;

  localStorage.clear();
  renderMenu();
}

function renderHow() {

// ===== INIT =====
const savedId = localStorage.getItem("vpn_id");

if (savedId) {

</script>
