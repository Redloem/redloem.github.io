<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access</title>
</head>

<body style="font-family:sans-serif; max-width:400px; margin:auto; padding:20px;">

<h2>Доступ</h2>
<p>Стабильное подключение</p>

<hr>

<h3>💳 Оплата</h3>
<p><b>ЮMoney:</b> 4100XXXXXXXX</p>
<p><b>Сумма:</b> 199₽</p>
<p>Комментарий: ваш ник</p>

<hr>

<h3>После оплаты</h3>

<form id="vpnForm">
<input type="text" id="user" placeholder="Ваш ник" required style="width:100%; padding:10px;"><br><br>

<input type="email" id="email" placeholder="Email" required style="width:100%; padding:10px;"><br><br>

<input type="text" id="payment" placeholder="Комментарий платежа" required style="width:100%; padding:10px;"><br><br>

<button type="submit" style="width:100%; padding:12px;">Отправить</button>
</form>

<script>
document.getElementById("vpnForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const user = document.getElementById("user").value;
  const email = document.getElementById("email").value;
  const payment = document.getElementById("payment").value;

  if (payment.length < 3) {
    alert("Введите корректный платёж");
    return;
  }

  fetch("https://api.muvik3d.workers.dev/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      user: user,
      email: email,
      payment: payment
    })
  })
  .then(() => {
    alert("Заявка отправлена! Ожидайте конфиг");
    document.getElementById("vpnForm").reset();
  })
  .catch((err) => {
    console.error(err);
    alert("Ошибка отправки");
  });
});
</script>

</body>
</html>
