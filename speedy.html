<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access</title>
</head>

<body style="font-family:sans-serif; max-width:400px; margin:auto; padding:20px;">

<h2>Доступ</h2>

<div id="app">

<form id="vpnForm">
<input type="text" id="user" placeholder="Ваш ник" required style="width:100%; padding:10px;"><br><br>
<input type="email" id="email" placeholder="Email" required style="width:100%; padding:10px;"><br><br>
<button type="submit" style="width:100%; padding:12px;">Отправить</button>
</form>

</div>

<script>
let currentId = localStorage.getItem("vpn_id");

if (currentId) {
  showStatus(currentId);
}

document.getElementById("vpnForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const user = document.getElementById("user").value;
  const email = document.getElementById("email").value;

  const res = await fetch("https://api.muvik3d.workers.dev/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user, email })
  });

  const data = await res.json();

  localStorage.setItem("vpn_id", data.id);
  showStatus(data.id);
});

async function showStatus(id) {
  document.getElementById("app").innerHTML = `
    <h3>Заявка ${id}</h3>
    <p id="status">Ожидайте...</p>
    <button onclick="checkStatus()">Обновить</button>
  `;

  window.checkStatus = async function() {
    const res = await fetch(`https://api.muvik3d.workers.dev/check?id=${id}`);
    const data = await res.json();

    if (data.status === "pending") {
      document.getElementById("status").innerText = "Ожидайте...";
    }

    if (data.status === "done") {
      document.getElementById("status").innerHTML = `
        <b>Ваш ключ:</b><br>${data.key}
      `;
    }
  };
}
</script>

</body>
</html>
