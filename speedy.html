<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speedy</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

.card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}
.logo img {
  width: 70px;
  border-radius: 16px;
}

h1 {
  font-size: 24px;
  margin: 0 0 10px;
  text-align: center;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
  font-size: 14px;
  line-height: 1.5;
  text-align: center;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  margin-top: 10px;
}

.primary { background: #007aff; color: white; }
.secondary { background: #e5e5ea; }
.link { background: #34c759; color: white; }

.small {
  font-size: 14px;
  color: #777;
  line-height: 1.5;
}

.keybox {
  background: #f2f2f7;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-size: 14px;
  border: 1px solid #e5e5ea;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  box-sizing: border-box;
  font-size: 16px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card" id="app"></div>
</div>

<script>
const API = "https://api.muvik3d.workers.dev";

let selectedPlan = null;
let isReadyShown = false;

// ===== МЕНЮ =====
function renderMenu() {
  document.getElementById("app").innerHTML = `
    <div class="logo"><img src="logo.jpg"></div>

    <h1>Speedy VPN</h1>

    <div class="subtitle">
      Стабильный доступ к скорости<br><br>

      Работаем с 01.12.2025<br>
      Основной сервер сейчас<br>
      имеет лококацию: Нидерланды<br>

      Основной бот:
      <a href="https://t.me/speedystart_bot" target="_blank">@speedystart_bot</a>
    </div>

    <button class="primary" onclick="renderBuy()">💳 Получить доступ</button>
    <button onclick="renderDownload()">📲 Скачать</button>
    <button onclick="renderHow()">📘 Инструкция</button>
    <button onclick="renderSupport()">📩 Поддержка</button>
    <button onclick="renderCheck()">🔍 Проверить заявку</button>
  `;
}

// ===== ПРОВЕРКА =====
function renderCheck() {
  document.getElementById("app").innerHTML = `
    <h1>🔍 Проверка</h1>

    <input id="checkId" placeholder="Номер заявки">

    <button class="primary" onclick="checkManual()">Проверить</button>
    <button class="secondary" onclick="renderMenu()">← Назад</button>
  `;
}

async function checkManual() {
  const id = document.getElementById("checkId").value;

  if (!id) return alert("Введите номер");

  const res = await fetch(API + "/check?id=" + id);
  const data = await res.json();

  if (data.status !== "done") {
    alert("❌ Не готово");
    return;
  }

  const end = new Date(data.end_date);
  alert("Действует до: " + end.toLocaleDateString("ru-RU"));
}

// ===== ОПЛАТА =====
function renderBuy() {
  document.getElementById("app").innerHTML = `
    <h1>💳 Оплата</h1>

    <div class="small">
      Выберите срок:<br>
      • 30 дней — 100₽<br>
      • 90 дней — 300₽<br>
      • 180 дней — 600₽<br>
      • 365 дней — 1200₽<br><br>
      Если выбор сделан на тариф сроком более 30 дней,<br>
      тогда на оплате поменяйте "100 рублей"<br>
    </div>

    <a href="https://yoomoney.ru/to/41001638704386" target="_blank">
      <button class="primary">💰 Оплатить</button>
    </a>

    <div class="small" style="margin-top:10px;">
      После оплаты нажмите кнопку ниже
    </div>

    <button onclick="renderForm()">✅ Я оплатил</button>
    <button class="secondary" onclick="renderMenu()">← Назад</button>
  `;
}

// ===== ФОРМА =====
function renderForm() {
  selectedPlan = null;

  document.getElementById("app").innerHTML = `
    <h1>📝Заявка </h1>

<input id="user" placeholder="Ваш Telegram ник или имя">

    <p class="small">Оплаченный срок подписки:</p>

    <button onclick="selectPlan(30)">30 дней</button>
    <button onclick="selectPlan(90)">90 дней</button>
    <button onclick="selectPlan(180)">180 дней</button>
    <button onclick="selectPlan(365)">365 дней</button>

    <p id="planText" class="small">Не выбран</p>

    <button class="primary" onclick="createOrder()">🚀 Отправить</button>
    <button class="secondary" onclick="renderMenu()">← Назад</button>
  `;
}

function selectPlan(days) {
  selectedPlan = days;
  document.getElementById("planText").innerText = "Выбрано: " + days + " дней";
}

// ===== CREATE =====
async function createOrder() {
  const user = document.getElementById("user").value;

  if (!user) return alert("Введите ник телеграм или имя");
  if (!selectedPlan) return alert("Выберите срок");

  const res = await fetch(API + "/create", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ user, plan: selectedPlan })
  });

  const data = await res.json();

  localStorage.setItem("vpn_id", data.id);
  localStorage.setItem("vpn_user", user);
  localStorage.setItem("vpn_plan", selectedPlan);
  localStorage.removeItem("vpn_key");

  renderStatus(data.id);
}



// ===== СТАТУС =====
function renderStatus(id) {
  const user = localStorage.getItem("vpn_user");
  const plan = localStorage.getItem("vpn_plan");

  document.getElementById("app").innerHTML = `
    <h1>🔐 Доступ</h1>

    <p>Заявка <b>${id}</b></p>

    <div class="small">
      👤 ${user}<br>
      📅 ${plan} дней<br><br> 
    </div>

    <div id="keyBox" class="keybox"></div>

    <div class="small" style="margin-top:10px;">
      Проверяем факт оплаты.<br>
      После подтверждения статус изменится на "Готово"<br><br>

      Обычно до 10 минут (09:00–18:00 МСК)<br>
      В другое время возможны задержки<br><br>

      Поддержка:
      <a href="https://t.me/speedy_supportbot">@speedy_supportbot</a>
    </div>

    <button id="copyBtn" style="display:none;" onclick="copyKey()">📋 Скопировать ключ</button>

    <button class="secondary" onclick="reset()">🔄 Новый заказ</button>
  `;

  checkStatus();
  setInterval(checkStatus, 10000);
}

// ===== ПРОВЕРКА =====
async function checkStatus() {
  const id = localStorage.getItem("vpn_id");

  const res = await fetch(API + "/check?id=" + id);
  const data = await res.json();

  // 🔥 если уже использован
  if (data.used) {
  document.getElementById("keyBox").innerHTML = `✅ Готово`;

  const btn = document.getElementById("copyBtn");
  btn.style.display = "block";
  btn.innerText = "✅ Используется";
  btn.disabled = true;

  return;
}

  // 🔥 если готово и есть ключ
  if (data.status === "done" && data.key) {
    localStorage.setItem("vpn_key", data.key);
    showReady();
  } else {
    document.getElementById("keyBox").innerHTML = `⏳ Ожидаем проверку оплаты`;
  }
}

// ===== ГОТОВО =====
function showReady() {
  if (isReadyShown) return;
  isReadyShown = true;

  document.getElementById("keyBox").innerHTML = `✅ Готово`;
  document.getElementById("copyBtn").style.display = "block";
}

// ===== КОПИЯ =====
async function copyKey() {
  const key = localStorage.getItem("vpn_key");
  const id = localStorage.getItem("vpn_id");

  await navigator.clipboard.writeText(key);
  await fetch(API + "/use?id=" + id);

  localStorage.removeItem("vpn_key");

  const btn = document.getElementById("copyBtn");
  btn.innerText = "✅ Используется";
  btn.disabled = true;

  alert("Ключ скопирован");
}

// ===== RESET =====
function reset() {
  const confirmExit = confirm("Вы перейдёте к созданию новой заявки.\nТекущая информация будет сброшена.\nПродолжить?");
  if (!confirmExit) return;

  localStorage.clear();
  renderMenu();
}

// ===== СКАЧАТЬ =====
function renderDownload() {
  document.getElementById("app").innerHTML = `
    <h1>📲 Скачать</h1>

    <p class="small">Установите приложение под ваше устройство:</p>

    <a href="https://play.google.com/store/apps/details?id=org.amnezia.vpn"><button class="link">Android</button></a>
    <a href="https://apps.apple.com/ru/app/defaultvpn/id6744725017"><button class="link">iPhone</button></a>
    <a href="https://amnezia.org/ru/downloads"><button class="link">Windows / Mac / Linux</button></a>

    <button class="secondary" onclick="renderMenu()">← Назад</button>
  `;
}

// ===== ИНСТРУКЦИЯ =====
function renderHow() {
  document.getElementById("app").innerHTML = `
    <h1>📘 Инструкция</h1>

    <p class="small">
    1. Установите приложение<br><br>
    2. Оплатите доступ<br><br>
    3. Нажмите "Я оплатил"<br><br>
    4. Дождитесь проверки<br><br>
    5. Скопируйте ключ<br><br>
    6. Вставьте в приложение<br><br>
    7. Подключитесь
    </p>

    <button class="secondary" onclick="renderMenu()">← Назад</button>
  `;
}

// ===== ПОДДЕРЖКА =====
function renderSupport() {
  document.getElementById("app").innerHTML = `
    <h1>📩 Поддержка</h1>

    <a href="https://t.me/speedy_supportbot">
      <button class="primary">💬 Телеграм</button>
    </a>

    <a href="mailto:muvik3d@gmail.com">
      <button class="link">📧 Email</button>
    </a>

    <button onclick="copyEmail()">📋 Скопировать почту</button>

    <button class="secondary" onclick="renderMenu()">← Назад</button>
  `;
}

function copyEmail() {
  navigator.clipboard.writeText("muvik3d@gmail.com");
  alert("Почта скопирована");
}

// ===== INIT =====
const savedId = localStorage.getItem("vpn_id");

if (savedId) {
  renderStatus(savedId);
} else {
  renderMenu();
}
</script>

</body>
</html>
